name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.STORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out app/build/outputs/apk/release/PhotoSlide-${{ github.ref_name }}.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          {
            echo 'body<<EOF'
            awk "
              /^## \[$VERSION\]/ { p=1; next }
              p && /^## \[/ { exit }
              p { print }
            " CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^\s*$/{$d;N;ba}'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2.6.1
        with:
          name: PhotoSlide ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: app/build/outputs/apk/release/PhotoSlide-${{ github.ref_name }}.apk
